<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#30363d" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="380" rx="12" fill="url(#bg)"/>
  <rect width="800" height="380" rx="12" fill="url(#dots)"/>
  <rect width="800" height="380" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="url(#brandGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Multi-Platform Sync</text>
  <text x="400" y="56" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12">One source of truth, every AI platform supported</text>

  <!-- Source: KNOWNS.md -->
  <rect x="280" y="80" width="240" height="70" rx="12" fill="#a855f7" opacity="0.06" filter="url(#s)"/>
  <rect x="280" y="80" width="240" height="70" rx="12" stroke="url(#brandGrad)" stroke-width="1.5" fill="none"/>
  <text x="400" y="110" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">KNOWNS.md</text>
  <text x="400" y="130" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Single source of truth</text>

  <!-- knowns sync command -->
  <rect x="330" y="165" width="140" height="24" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="181" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="10">knowns sync</text>

  <!-- Fan-out arrows -->
  <line x1="310" y1="189" x2="120" y2="240" stroke="#a371f7" stroke-width="1.2" opacity="0.35"/>
  <polygon points="118,236 118,244 126,240" fill="#a371f7" opacity="0.5"/>

  <line x1="360" y1="189" x2="290" y2="240" stroke="#58a6ff" stroke-width="1.2" opacity="0.35"/>
  <polygon points="288,236 288,244 296,240" fill="#58a6ff" opacity="0.5"/>

  <line x1="400" y1="189" x2="400" y2="240" stroke="#3fb950" stroke-width="1.2" opacity="0.35"/>
  <polygon points="396,238 400,248 404,238" fill="#3fb950" opacity="0.5"/>

  <line x1="440" y1="189" x2="510" y2="240" stroke="#f0883e" stroke-width="1.2" opacity="0.35"/>
