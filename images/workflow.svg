  <line x1="500" y1="274" x2="500" y2="304" stroke="#f0883e" stroke-width="1.2" opacity="0.32"/>
  <polygon points="496,302 500,312 504,302" fill="#f0883e" opacity="0.7"/>

  <!-- Right branch -->
  <line x1="590" y1="236" x2="690" y2="236" stroke="#3fb950" stroke-width="1.2" opacity="0.32"/>
  <line x1="690" y1="236" x2="690" y2="432" stroke="#3fb950" stroke-width="1.2" opacity="0.32"/>
  <polygon points="686,430 690,440 694,430" fill="#3fb950" opacity="0.7"/>

