<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#30363d" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="420" rx="12" fill="url(#bg)"/>
  <rect width="800" height="420" rx="12" fill="url(#dots)"/>
  <rect width="800" height="420" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="url(#brandGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">MCP Integration</text>
  <text x="400" y="56" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12">AI platforms connect to Knowns via Model Context Protocol</text>

  <!-- ═══ LEFT: AI Platforms ═══ -->
  <text x="130" y="90" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">AI PLATFORMS</text>

  <rect x="40" y="105" width="180" height="36" rx="8" fill="#a371f7" opacity="0.06" filter="url(#s)"/>
  <rect x="40" y="105" width="180" height="36" rx="8" stroke="#a371f7" stroke-width="1" fill="none"/>
  <text x="130" y="128" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Claude Code</text>

  <rect x="40" y="150" width="180" height="36" rx="8" fill="#58a6ff" opacity="0.06" filter="url(#s)"/>
  <rect x="40" y="150" width="180" height="36" rx="8" stroke="#58a6ff" stroke-width="1" fill="none"/>
  <text x="130" y="173" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Cursor</text>

  <rect x="40" y="195" width="180" height="36" rx="8" fill="#3fb950" opacity="0.06" filter="url(#s)"/>
  <rect x="40" y="195" width="180" height="36" rx="8" stroke="#3fb950" stroke-width="1" fill="none"/>
  <text x="130" y="218" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Gemini CLI</text>

  <rect x="40" y="240" width="180" height="36" rx="8" fill="#f0883e" opacity="0.06" filter="url(#s)"/>
  <rect x="40" y="240" width="180" height="36" rx="8" stroke="#f0883e" stroke-width="1" fill="none"/>
  <text x="130" y="263" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Claude Desktop</text>

  <rect x="40" y="285" width="180" height="36" rx="8" fill="#79c0ff" opacity="0.06" filter="url(#s)"/>
  <rect x="40" y="285" width="180" height="36" rx="8" stroke="#79c0ff" stroke-width="1" fill="none"/>
  <text x="130" y="308" text-anchor="middle" fill="#79c0ff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">OpenCode</text>

  <!-- ═══ CENTER: MCP Server ═══ -->
  <!-- Arrows left → center -->
  <line x1="220" y1="123" x2="310" y2="200" stroke="#a371f7" stroke-width="1.2" opacity="0.3"/>
  <line x1="220" y1="168" x2="310" y2="200" stroke="#58a6ff" stroke-width="1.2" opacity="0.3"/>
  <line x1="220" y1="213" x2="310" y2="210" stroke="#3fb950" stroke-width="1.2" opacity="0.3"/>
  <line x1="220" y1="258" x2="310" y2="220" stroke="#f0883e" stroke-width="1.2" opacity="0.3"/>
  <line x1="220" y1="303" x2="310" y2="225" stroke="#79c0ff" stroke-width="1.2" opacity="0.3"/>

  <rect x="310" y="130" width="180" height="160" rx="12" fill="#a855f7" opacity="0.06" filter="url(#s)"/>
  <rect x="310" y="130" width="180" height="160" rx="12" stroke="url(#brandGrad)" stroke-width="1.5" fill="none"/>

  <text x="400" y="168" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">MCP Server</text>
  <text x="400" y="188" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">stdio transport</text>

  <!-- MCP tools list -->
  <rect x="330" y="200" width="140" height="14" rx="7" fill="#a855f7" opacity="0.08"/>
  <text x="400" y="210" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="7">create_task · get_task</text>
  <rect x="330" y="218" width="140" height="14" rx="7" fill="#a855f7" opacity="0.08"/>
  <text x="400" y="228" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="7">get_doc · search · retrieve</text>
  <rect x="330" y="236" width="140" height="14" rx="7" fill="#a855f7" opacity="0.08"/>
  <text x="400" y="246" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="7">add_memory · code_search</text>
  <rect x="330" y="254" width="140" height="14" rx="7" fill="#a855f7" opacity="0.08"/>
  <text x="400" y="264" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="7">run_template · validate</text>

  <!-- ═══ RIGHT: Knowns Data ═══ -->
  <!-- Arrows center → right -->
  <line x1="490" y1="180" x2="570" y2="140" stroke="#484f58" stroke-width="1.2"/>
  <polygon points="568,136 578,140 568,144" fill="#484f58"/>
  <line x1="490" y1="200" x2="570" y2="200" stroke="#484f58" stroke-width="1.2"/>
  <polygon points="568,196 578,200 568,204" fill="#484f58"/>
  <line x1="490" y1="220" x2="570" y2="255" stroke="#484f58" stroke-width="1.2"/>
  <polygon points="568,251 578,255 568,259" fill="#484f58"/>
  <line x1="490" y1="250" x2="570" y2="310" stroke="#484f58" stroke-width="1.2"/>
  <polygon points="568,306 578,310 568,314" fill="#484f58"/>

  <text x="670" y="90" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">.knowns/ DATA</text>

  <rect x="580" y="105" width="180" height="36" rx="8" fill="#f0883e" opacity="0.06"/>
  <rect x="580" y="105" width="180" height="36" rx="8" stroke="#f0883e" stroke-width="1" fill="none"/>
  <text x="670" y="128" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="12">Tasks + Plans</text>

  <rect x="580" y="150" width="180" height="36" rx="8" fill="#a371f7" opacity="0.06"/>
  <rect x="580" y="150" width="180" height="36" rx="8" stroke="#a371f7" stroke-width="1" fill="none"/>
  <text x="670" y="173" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="12">Docs + Specs</text>

  <rect x="580" y="195" width="180" height="36" rx="8" fill="#f778ba" opacity="0.06"/>
  <rect x="580" y="195" width="180" height="36" rx="8" stroke="#f778ba" stroke-width="1" fill="none"/>
  <text x="670" y="218" text-anchor="middle" fill="#f778ba" font-family="system-ui, -apple-system, sans-serif" font-size="12">Memory (3-layer)</text>

  <rect x="580" y="240" width="180" height="36" rx="8" fill="#3fb950" opacity="0.06"/>
  <rect x="580" y="240" width="180" height="36" rx="8" stroke="#3fb950" stroke-width="1" fill="none"/>
  <text x="670" y="263" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="12">Code Index</text>

  <rect x="580" y="285" width="180" height="36" rx="8" fill="#79c0ff" opacity="0.06"/>
  <rect x="580" y="285" width="180" height="36" rx="8" stroke="#79c0ff" stroke-width="1" fill="none"/>
  <text x="670" y="308" text-anchor="middle" fill="#79c0ff" font-family="system-ui, -apple-system, sans-serif" font-size="12">Templates</text>

  <!-- Config badges -->
  <rect x="140" y="345" width="200" height="32" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="240" y="365" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Per-project:</text>
  <text x="240" y="378" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="9">.mcp.json</text>

  <rect x="460" y="345" width="200" height="32" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="560" y="365" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Global (needs init):</text>
  <text x="560" y="378" text-anchor="middle" fill="#f0883e" font-family="monospace" font-size="9">detect_projects → set_project</text>

  <!-- Footer -->
  <text x="400" y="410" text-anchor="middle" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="10">knowns mcp setup — one command to configure everything</text>
</svg>