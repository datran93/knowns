  <text x="390" y="562" text-anchor="middle" fill="#d29922" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Review</text>
  <text x="390" y="580" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Multi-perspective check</text>
  <rect x="340" y="584" width="70" height="10" rx="5" fill="#d29922" opacity="0.14"/>
  <text x="375" y="592" text-anchor="middle" fill="#d29922" font-family="monospace" font-size="7">/kn-review</text>

  <line x1="470" y1="566" x2="530" y2="566" stroke="#484f58" stroke-width="1.2" opacity="0.32"/>
  <polygon points="528,562 538,566 528,570" fill="#484f58" opacity="0.7"/>

  <rect x="540" y="536" width="160" height="60" rx="12" fill="#3fb950" opacity="0.1" filter="url(#shadow)"/>
  <rect x="540" y="536" width="160" height="60" rx="12" stroke="#3fb950" stroke-width="1.2" fill="none"/>
  <text x="620" y="562" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Commit</text>
  <text x="620" y="580" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Conventional format</text>
  <rect x="570" y="584" width="72" height="10" rx="5" fill="#3fb950" opacity="0.14"/>
  <text x="606" y="592" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="7">/kn-commit</text>

  <!-- Side hint -->
  <rect x="52" y="370" width="76" height="48" rx="8" fill="#58a6ff" opacity="0.1"/>
  <rect x="52" y="370" width="76" height="48" rx="8" stroke="#58a6ff" stroke-width="0.8" stroke-dasharray="4,2" fill="none"/>
  <text x="90" y="390" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">New</text>
  <text x="90" y="404" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">feature</text>

  <text x="400" y="612" text-anchor="middle" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="10">Pick the right depth for the job — from quick fix to full spec-driven development</text>
</svg>
