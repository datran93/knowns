<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="brandGradWide" x1="200" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="60" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#30363d" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow orbs -->
  <ellipse cx="400" cy="280" rx="350" ry="250" fill="#a855f7" opacity="0.04" filter="url(#bigGlow)"/>
  <ellipse cx="800" cy="350" rx="300" ry="220" fill="#db2777" opacity="0.04" filter="url(#bigGlow)"/>

  <!-- Brand line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#brandGradWide)"/>

  <!-- Center logo -->
  <image href="data:image/png;base64, " x="562" y="90" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>

  <!-- Main title -->
  <text x="600" y="242" text-anchor="middle" fill="url(#brandGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" letter-spacing="-2" filter="url(#textGlow)">Knowns</text>

  <!-- Subtitle -->
  <text x="600" y="312" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500">Structured context for AI-native development</text>

  <!-- Divider line -->
  <line x1="440" y1="342" x2="760" y2="342" stroke="url(#brandGradWide)" stroke-width="1.5" opacity="0.3"/>

  <!-- Description -->
  <text x="600" y="387" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="20">Tasks, docs, memory, and code context that make AI actually understand your project.</text>

  <!-- Feature pills -->
  <rect x="228" y="432" width="110" height="38" rx="19" fill="#a371f7" opacity="0.1"/>
  <rect x="228" y="432" width="110" height="38" rx="19" stroke="#a371f7" stroke-width="1" fill="none"/>
  <text x="283" y="456" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="15">Memory</text>

  <rect x="354" y="432" width="100" height="38" rx="19" fill="#58a6ff" opacity="0.1"/>
  <rect x="354" y="432" width="100" height="38" rx="19" stroke="#58a6ff" stroke-width="1" fill="none"/>
  <text x="404" y="456" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="15">Specs</text>

  <rect x="470" y="432" width="100" height="38" rx="19" fill="#f0883e" opacity="0.1"/>
  <rect x="470" y="432" width="100" height="38" rx="19" stroke="#f0883e" stroke-width="1" fill="none"/>
  <text x="520" y="456" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="15">Tasks</text>

  <rect x="586" y="432" width="90" height="38" rx="19" fill="#a371f7" opacity="0.1"/>
  <rect x="586" y="432" width="90" height="38" rx="19" stroke="#a371f7" stroke-width="1" fill="none"/>
  <text x="631" y="456" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="15">Docs</text>

  <rect x="692" y="432" width="90" height="38" rx="19" fill="#3fb950" opacity="0.1"/>
  <rect x="692" y="432" width="90" height="38" rx="19" stroke="#3fb950" stroke-width="1" fill="none"/>
  <text x="737" y="456" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="15">Code</text>

  <rect x="798" y="432" width="110" height="38" rx="19" fill="#79c0ff" opacity="0.1"/>
  <rect x="798" y="432" width="110" height="38" rx="19" stroke="#79c0ff" stroke-width="1" fill="none"/>
  <text x="853" y="456" text-anchor="middle" fill="#79c0ff" font-family="system-ui, -apple-system, sans-serif" font-size="15">Search</text>

  <!-- CLI one-liner -->
  <rect x="380" y="502" width="440" height="44" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="410" y="530" fill="#8b949e" font-family="monospace" font-size="16">$</text>
  <text x="430" y="530" fill="#e6edf3" font-family="monospace" font-size="16">npm install -g knowns</text>

  <!-- Bottom tagline -->
  <text x="600" y="592" text-anchor="middle" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="16">What your AI should have knowns.</text>

  <!-- Brand line bottom -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#brandGradWide)"/>
</svg>
