  <text x="546" y="292" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Medium</text>
  <rect x="620" y="224" width="84" height="16" rx="8" fill="#3fb950" opacity="0.14"/>
  <text x="662" y="236" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Quick fix</text>

  <!-- Left branch -->
  <line x1="410" y1="236" x2="210" y2="236" stroke="#58a6ff" stroke-width="1.2" opacity="0.32"/>
  <line x1="210" y1="236" x2="210" y2="304" stroke="#58a6ff" stroke-width="1.2" opacity="0.32"/>
  <polygon points="206,302 210,312 214,302" fill="#58a6ff" opacity="0.7"/>

