  <rect x="120" y="314" width="180" height="64" rx="12" fill="#58a6ff" opacity="0.1" filter="url(#shadow)"/>
  <rect x="120" y="314" width="180" height="64" rx="12" stroke="#58a6ff" stroke-width="1.2" fill="none"/>
  <text x="210" y="341" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Spec</text>
  <text x="210" y="359" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Define ACs + design</text>
  <rect x="165" y="364" width="60" height="12" rx="6" fill="#58a6ff" opacity="0.14"/>
  <text x="195" y="373" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="7">/kn-spec</text>

  <line x1="210" y1="378" x2="210" y2="414" stroke="#484f58" stroke-width="1.2" opacity="0.32"/>
  <polygon points="206,412 210,422 214,412" fill="#484f58" opacity="0.7"/>

