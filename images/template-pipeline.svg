<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#30363d" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="360" rx="12" fill="url(#bg)"/>
  <rect width="800" height="360" rx="12" fill="url(#dots)"/>
  <rect width="800" height="360" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="url(#brandGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Template Execution Pipeline</text>
  <text x="400" y="56" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12">From config to generated code in one command</text>

  <!-- Step 1: Config -->
  <rect x="30" y="85" width="140" height="100" rx="10" fill="#58a6ff" opacity="0.06" filter="url(#s)"/>
  <rect x="30" y="85" width="140" height="100" rx="10" stroke="#58a6ff" stroke-width="1.2" fill="none"/>
  <text x="100" y="110" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Config</text>
  <text x="100" y="130" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="8">_template.yaml</text>
  <text x="100" y="150" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">prompts</text>
  <text x="100" y="164" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">destination</text>
  <text x="100" y="178" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">doc link</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="135" x2="200" y2="135" stroke="#484f58" stroke-width="1.2"/>
  <polygon points="198,131 208,135 198,139" fill="#484f58"/>

  <!-- Step 2: Prompts -->
  <rect x="210" y="85" width="140" height="100" rx="10" fill="#a371f7" opacity="0.06" filter="url(#s)"/>
  <rect x="210" y="85" width="140" height="100" rx="10" stroke="#a371f7" stroke-width="1.2" fill="none"/>
  <text x="280" y="110" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Prompts</text>
  <text x="280" y="132" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Interactive or</text>
  <text x="280" y="146" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">pre-filled via</text>
  <rect x="240" y="154" width="80" height="14" rx="7" fill="#a371f7" opacity="0.08"/>
  <text x="280" y="164" text-anchor="middle" fill="#a371f7" font-family="monospace" font-size="8">-v name=X</text>

  <!-- Arrow 2→3 -->
  <line x1="350" y1="135" x2="380" y2="135" stroke="#484f58" stroke-width="1.2"/>
  <polygon points="378,131 388,135 378,139" fill="#484f58"/>

  <!-- Step 3: Variables -->
  <rect x="390" y="85" width="140" height="100" rx="10" fill="#f0883e" opacity="0.06" filter="url(#s)"/>
  <rect x="390" y="85" width="140" height="100" rx="10" stroke="#f0883e" stroke-width="1.2" fill="none"/>
  <text x="460" y="110" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Variables</text>
  <text x="460" y="132" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Resolve helpers:</text>
  <rect x="410" y="140" width="100" height="14" rx="7" fill="#f0883e" opacity="0.08"/>
  <text x="460" y="150" text-anchor="middle" fill="#f0883e" font-family="monospace" font-size="7">{{pascalCase name}}</text>
  <rect x="410" y="158" width="100" height="14" rx="7" fill="#f0883e" opacity="0.08"/>
  <text x="460" y="168" text-anchor="middle" fill="#f0883e" font-family="monospace" font-size="7">{{kebabCase name}}</text>

  <!-- Arrow 3→4 -->
  <line x1="530" y1="135" x2="560" y2="135" stroke="#484f58" stroke-width="1.2"/>
  <polygon points="558,131 568,135 558,139" fill="#484f58"/>

  <!-- Step 4: Render -->
  <rect x="570" y="85" width="140" height="100" rx="10" fill="#3fb950" opacity="0.06" filter="url(#s)"/>
  <rect x="570" y="85" width="140" height="100" rx="10" stroke="#3fb950" stroke-width="1.2" fill="none"/>
  <text x="640" y="110" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Render</text>
  <text x="640" y="132" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Handlebars .hbs</text>
  <text x="640" y="146" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">→ generated files</text>
  <rect x="600" y="158" width="80" height="14" rx="7" fill="#3fb950" opacity="0.08"/>
  <text x="640" y="168" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="7">--dry-run</text>

  <!-- Output example -->
  <rect x="100" y="215" width="600" height="110" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#s)"/>

  <!-- Terminal dots -->
  <circle cx="122" cy="232" r="4" fill="#f0883e" opacity="0.7"/>
  <circle cx="134" cy="232" r="4" fill="#d29922" opacity="0.7"/>
  <circle cx="146" cy="232" r="4" fill="#3fb950" opacity="0.7"/>

  <text x="120" y="258" fill="#8b949e" font-family="monospace" font-size="11">$</text>
  <text x="135" y="258" fill="#e6edf3" font-family="monospace" font-size="11">knowns template run react-component -v name=UserProfile</text>
  <text x="120" y="278" fill="#3fb950" font-family="monospace" font-size="10">Created  src/components/UserProfile.tsx</text>
  <text x="120" y="294" fill="#3fb950" font-family="monospace" font-size="10">Created  src/components/UserProfile.test.tsx</text>
  <text x="120" y="310" fill="#3fb950" font-family="monospace" font-size="10">Created  src/components/UserProfile.module.css</text>

  <!-- Footer -->
  <text x="400" y="350" text-anchor="middle" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="10">Templates live in .knowns/templates/ — create your own with knowns template create</text>
</svg>