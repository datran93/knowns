name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: '1'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: Lint & Test (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Zig for Windows cgo
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ZIG_ARCH: x86_64
          ZIG_VERSION: 0.14.0
        run: |
          $zigRoot = Join-Path $env:RUNNER_TEMP 'zig'
          $zipPath = Join-Path $env:RUNNER_TEMP 'zig.zip'
          $folder = "zig-windows-$env:ZIG_ARCH-$env:ZIG_VERSION"
          $url = "https://ziglang.org/download/$env:ZIG_VERSION/$folder.zip"

          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $zigRoot -Force
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $zigRoot $folder)

      - name: Configure Windows cgo compiler
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ZIG_TARGET: x86_64-windows-gnu
        run: |
          $ccPath = Join-Path $env:RUNNER_TEMP 'zig-cc.cmd'
          $cxxPath = Join-Path $env:RUNNER_TEMP 'zig-cxx.cmd'

          @"
          @echo off
          zig cc -target %ZIG_TARGET% %*
          "@ | Set-Content -Path $ccPath -Encoding ascii

          @"
          @echo off
          zig c++ -target %ZIG_TARGET% %*
          "@ | Set-Content -Path $cxxPath -Encoding ascii

          Add-Content -Path $env:GITHUB_PATH -Value $env:RUNNER_TEMP
          Add-Content -Path $env:GITHUB_ENV -Value "ZIG_TARGET=$env:ZIG_TARGET"
          Add-Content -Path $env:GITHUB_ENV -Value "CC=zig-cc"
          Add-Content -Path $env:GITHUB_ENV -Value "CXX=zig-cxx"

      - name: Build UI
        run: cd ui && bun install --frozen-lockfile && bun run build

      - name: Build Go binary (Unix)
        if: runner.os != 'Windows'
        run: make build

      - name: Build Go binary (Windows)
        if: runner.os == 'Windows'
        run: go build -ldflags "-s -w -X github.com/howznguyen/knowns/internal/util.Version=${env:GITHUB_SHA}" -o bin/knowns.exe ./cmd/knowns

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

  build-and-e2e:
    runs-on: ubuntu-latest
    needs: test
    name: Build & E2E
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: cd ui && bun install --frozen-lockfile && bun run build

      - name: Build Go binary (with embedded UI)
        run: make build

      - name: Install Playwright browsers
        run: cd ui && bunx playwright install --with-deps chromium

      - name: Verify binary
        run: |
          ./bin/knowns --version
          echo "Build verification passed"

      - name: Run E2E tests
        run: |
          (cd tests && go test -v -timeout 300s -count=1 -run TestCLI ./...)
          (cd tests && go test -v -timeout 300s -count=1 -run TestMCP ./...)

      - name: Run UI Playwright tests
        run: cd ui && TEST_BINARY=../bin/knowns bun test:e2e
