<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#30363d" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="800" height="620" rx="12" fill="url(#bg)"/>
  <rect width="800" height="620" rx="12" fill="url(#dots)" opacity="0.7"/>
  <rect width="800" height="620" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <text x="400" y="36" text-anchor="middle" fill="url(#brandGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">AI Workflow with Knowns</text>
  <text x="400" y="56" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12">Choose the right path based on feature size</text>

  <!-- Top lane -->
  <rect x="140" y="84" width="180" height="64" rx="12" fill="#a371f7" opacity="0.1" filter="url(#shadow)"/>
  <rect x="140" y="84" width="180" height="64" rx="12" stroke="#a371f7" stroke-width="1.2" fill="none"/>
  <text x="230" y="111" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Init</text>
  <text x="230" y="129" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Load context + memory</text>
  <rect x="185" y="134" width="64" height="12" rx="6" fill="#a371f7" opacity="0.14"/>
  <text x="217" y="143" text-anchor="middle" fill="#a371f7" font-family="monospace" font-size="7">/kn-init</text>

  <line x1="320" y1="116" x2="390" y2="116" stroke="#484f58" stroke-width="1.2" opacity="0.32"/>
  <polygon points="388,112 398,116 388,120" fill="#484f58" opacity="0.7"/>

  <rect x="410" y="84" width="180" height="64" rx="12" fill="#79c0ff" opacity="0.1" filter="url(#shadow)"/>
  <rect x="410" y="84" width="180" height="64" rx="12" stroke="#79c0ff" stroke-width="1.2" fill="none"/>
  <text x="500" y="111" text-anchor="middle" fill="#79c0ff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Research</text>
  <text x="500" y="129" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Explore code + patterns</text>
  <rect x="455" y="134" width="84" height="12" rx="6" fill="#79c0ff" opacity="0.14"/>
  <text x="497" y="143" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="7">/kn-research</text>

  <line x1="500" y1="148" x2="500" y2="188" stroke="#484f58" stroke-width="1.2" opacity="0.32"/>
  <polygon points="496,186 500,196 504,186" fill="#484f58" opacity="0.7"/>

  <!-- Decision -->
  <polygon points="500,198 590,236 500,274 410,236" fill="#d29922" opacity="0.1"/>
  <polygon points="500,198 590,236 500,274 410,236" stroke="#d29922" stroke-width="1.2" fill="none"/>
  <text x="500" y="232" text-anchor="middle" fill="#d29922" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Feature</text>
  <text x="500" y="246" text-anchor="middle" fill="#d29922" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">size?</text>

