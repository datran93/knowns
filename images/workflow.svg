  <text x="195" y="483" text-anchor="middle" fill="#f0883e" font-family="monospace" font-size="7">/kn-plan</text>

  <line x1="300" y1="456" x2="370" y2="456" stroke="#484f58" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.32"/>

  <!-- Medium path card -->
  <rect x="410" y="314" width="180" height="64" rx="12" fill="#f0883e" opacity="0.1" filter="url(#shadow)"/>
  <rect x="410" y="314" width="180" height="64" rx="12" stroke="#f0883e" stroke-width="1.2" fill="none"/>
  <text x="500" y="341" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Plan</text>
  <text x="500" y="359" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Gather context + steps</text>
  <rect x="455" y="364" width="60" height="12" rx="6" fill="#f0883e" opacity="0.14"/>
  <text x="485" y="373" text-anchor="middle" fill="#f0883e" font-family="monospace" font-size="7">/kn-plan</text>

  <line x1="500" y1="378" x2="500" y2="424" stroke="#484f58" stroke-width="1.2" opacity="0.32"/>
  <polygon points="496,422 500,432 504,422" fill="#484f58" opacity="0.7"/>

  <!-- Implement convergence -->
  <rect x="370" y="424" width="340" height="64" rx="12" fill="#f778ba" opacity="0.1" filter="url(#shadow)"/>
  <rect x="370" y="424" width="340" height="64" rx="12" stroke="#f778ba" stroke-width="1.2" fill="none"/>
  <text x="540" y="451" text-anchor="middle" fill="#f778ba" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Implement</text>
  <text x="540" y="469" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Follow plan, check ACs, track progress</text>
  <rect x="495" y="474" width="84" height="12" rx="6" fill="#f778ba" opacity="0.14"/>
  <text x="537" y="483" text-anchor="middle" fill="#f778ba" font-family="monospace" font-size="7">/kn-implement</text>

