  <text x="735" y="272" text-anchor="middle" fill="#79c0ff" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Generic</text>
  <text x="735" y="292" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="9">AGENTS.md</text>

