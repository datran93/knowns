<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="800" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="cs">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#30363d" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="12" fill="url(#cbg)"/>
  <rect width="800" height="380" rx="12" fill="url(#dots)"/>
  <rect width="800" height="380" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="url(#brandGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Core Capabilities</text>
  <text x="400" y="58" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12">Everything AI needs to understand your project</text>

  <!-- Row 1 -->
  <!-- Card 1: Persistent Memory -->
  <rect x="40" y="80" width="230" height="120" rx="12" fill="#a371f7" opacity="0.1" filter="url(#cs)"/>
  <rect x="40" y="80" width="230" height="120" rx="12" stroke="#a371f7" stroke-width="1.2" fill="none"/>
  <text x="68" y="113" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Persistent Memory</text>
  <text x="60" y="138" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">3-layer memory system:</text>
  <rect x="60" y="148" width="48" height="14" rx="7" fill="#a371f7" opacity="0.14"/>
  <text x="84" y="158" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="8">working</text>
  <rect x="114" y="148" width="44" height="14" rx="7" fill="#a371f7" opacity="0.14"/>
  <text x="136" y="158" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="8">project</text>
  <rect x="164" y="148" width="40" height="14" rx="7" fill="#a371f7" opacity="0.14"/>
  <text x="184" y="158" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="8">global</text>
  <text x="60" y="182" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">AI remembers across sessions</text>

  <!-- Card 2: Structured Knowledge -->
  <rect x="285" y="80" width="230" height="120" rx="12" fill="#58a6ff" opacity="0.1" filter="url(#cs)"/>
  <rect x="285" y="80" width="230" height="120" rx="12" stroke="#58a6ff" stroke-width="1.2" fill="none"/>
  <text x="313" y="113" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Structured Knowledge</text>
  <text x="305" y="138" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Specs, tasks, docs linked with</text>
  <text x="305" y="158" fill="#58a6ff" font-family="monospace" font-size="10">@doc/ @task- fulfills:</text>
  <text x="305" y="182" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Validated refs, no broken links</text>

  <!-- Card 3: Smart Context -->
  <rect x="530" y="80" width="230" height="120" rx="12" fill="#f0883e" opacity="0.1" filter="url(#cs)"/>
  <rect x="530" y="80" width="230" height="120" rx="12" stroke="#f0883e" stroke-width="1.2" fill="none"/>
  <text x="558" y="113" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Smart Context</text>
  <text x="550" y="138" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Semantic search with local AI</text>
  <rect x="550" y="148" width="44" height="14" rx="7" fill="#f0883e" opacity="0.14"/>
  <text x="572" y="158" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="8">hybrid</text>
  <rect x="600" y="148" width="56" height="14" rx="7" fill="#f0883e" opacity="0.14"/>
  <text x="628" y="158" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="8">semantic</text>
  <rect x="662" y="148" width="52" height="14" rx="7" fill="#f0883e" opacity="0.14"/>
  <text x="688" y="158" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="8">keyword</text>
  <text x="550" y="182" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Offline, private, fast retrieval</text>

  <!-- Row 2 -->
  <!-- Card 4: AI-Native Workflow -->
  <rect x="40" y="220" width="230" height="120" rx="12" fill="#3fb950" opacity="0.1" filter="url(#cs)"/>
  <rect x="40" y="220" width="230" height="120" rx="12" stroke="#3fb950" stroke-width="1.2" fill="none"/>
  <text x="68" y="253" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">AI-Native Workflow</text>
  <text x="60" y="278" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">MCP server + Claude skills</text>
  <text x="60" y="298" fill="#3fb950" font-family="monospace" font-size="9">init · plan · implement · commit</text>
  <text x="60" y="322" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">AI becomes an engineering partner</text>

  <!-- Card 5: Code Intelligence -->
  <rect x="285" y="220" width="230" height="120" rx="12" fill="#f778ba" opacity="0.1" filter="url(#cs)"/>
  <rect x="285" y="220" width="230" height="120" rx="12" stroke="#f778ba" stroke-width="1.2" fill="none"/>
  <text x="313" y="253" fill="#f778ba" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Code Intelligence</text>
  <text x="305" y="278" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">AST indexing for Go, TS, JS, Python</text>
  <rect x="305" y="288" width="48" height="14" rx="7" fill="#f778ba" opacity="0.14"/>
  <text x="329" y="298" text-anchor="middle" fill="#f778ba" font-family="system-ui, -apple-system, sans-serif" font-size="8">search</text>
  <rect x="359" y="288" width="52" height="14" rx="7" fill="#f778ba" opacity="0.14"/>
  <text x="385" y="298" text-anchor="middle" fill="#f778ba" font-family="system-ui, -apple-system, sans-serif" font-size="8">symbols</text>
  <rect x="417" y="288" width="36" height="14" rx="7" fill="#f778ba" opacity="0.14"/>
  <text x="435" y="298" text-anchor="middle" fill="#f778ba" font-family="system-ui, -apple-system, sans-serif" font-size="8">deps</text>
  <rect x="459" y="288" width="40" height="14" rx="7" fill="#f778ba" opacity="0.14"/>
  <text x="479" y="298" text-anchor="middle" fill="#f778ba" font-family="system-ui, -apple-system, sans-serif" font-size="8">graph</text>
  <text x="305" y="322" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Understand code structure instantly</text>

  <!-- Card 6: Self-Hostable -->
  <rect x="530" y="220" width="230" height="120" rx="12" fill="#79c0ff" opacity="0.1" filter="url(#cs)"/>
  <rect x="530" y="220" width="230" height="120" rx="12" stroke="#79c0ff" stroke-width="1.2" fill="none"/>
  <text x="558" y="253" fill="#79c0ff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Self-Hostable</text>
  <text x="550" y="278" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Local-first, no cloud dependency</text>
  <rect x="550" y="288" width="100" height="14" rx="7" fill="#79c0ff" opacity="0.14"/>
  <text x="600" y="298" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="8">.knowns/ in repo</text>
  <text x="550" y="322" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Full data control, always private</text>

  <!-- Footer -->
  <text x="400" y="366" text-anchor="middle" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="10">All capabilities work offline — your knowledge never leaves your machine</text>
</svg>
