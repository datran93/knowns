  <rect x="540" y="248" width="140" height="56" rx="8" fill="#f0883e" opacity="0.06" filter="url(#s)"/>
  <rect x="540" y="248" width="140" height="56" rx="8" stroke="#f0883e" stroke-width="1" fill="none"/>
  <text x="610" y="272" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Copilot</text>
  <text x="610" y="292" text-anchor="middle" fill="#f0883e" font-family="monospace" font-size="8">copilot-instructions.md</text>

