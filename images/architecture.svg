<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="knownsGlow" x1="0" y1="0" x2="560" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#9333ea" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#db2777" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#30363d" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>
  <rect width="800" height="520" rx="12" fill="url(#dots)" opacity="0.7"/>
  <rect width="800" height="520" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="url(#brandGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">How Knowns Works</text>
  <text x="400" y="62" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12">Persistent context layer between AI and your development tools</text>

  <!-- ═══ AI Agent Layer (top) ═══ -->
  <rect x="240" y="88" width="320" height="68" rx="12" fill="#a371f7" opacity="0.1" filter="url(#shadow)"/>
  <rect x="240" y="88" width="320" height="68" rx="12" stroke="#a371f7" stroke-width="1.2" fill="none"/>
  <text x="400" y="116" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">AI Agents</text>
  <text x="400" y="136" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Claude  ·  GPT  ·  Copilot  ·  Cursor  ·  OpenCode</text>

  <!-- Arrows: AI → Knowns -->
  <line x1="340" y1="156" x2="340" y2="206" stroke="#a371f7" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.4"/>
  <polygon points="336,204 340,214 344,204" fill="#a371f7" opacity="0.5"/>
  <text x="322" y="188" text-anchor="end" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">MCP / Skills</text>

  <line x1="460" y1="156" x2="460" y2="206" stroke="#a371f7" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.4"/>
  <polygon points="456,204 460,214 464,204" fill="#a371f7" opacity="0.5"/>
  <text x="478" y="188" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Context</text>

  <!-- ═══ Knowns Layer (middle) — brand gradient border ═══ -->
  <rect x="120" y="216" width="560" height="108" rx="14" fill="url(#knownsGlow)" filter="url(#shadow)"/>
  <rect x="120" y="216" width="560" height="108" rx="14" stroke="url(#brandGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>

  <text x="400" y="244" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Knowns</text>
  <text x="400" y="260" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Memory Layer for AI-Native Development</text>

  <!-- Knowns sub-items -->
  <rect x="138" y="274" width="80" height="28" rx="6" fill="#f0883e" opacity="0.14"/>
  <rect x="138" y="274" width="80" height="28" rx="6" stroke="#f0883e" stroke-width="0.8" fill="none"/>
  <text x="178" y="292" text-anchor="middle" fill="#f0883e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Tasks</text>

  <rect x="230" y="274" width="80" height="28" rx="6" fill="#a371f7" opacity="0.14"/>
  <rect x="230" y="274" width="80" height="28" rx="6" stroke="#a371f7" stroke-width="0.8" fill="none"/>
  <text x="270" y="292" text-anchor="middle" fill="#a371f7" font-family="system-ui, -apple-system, sans-serif" font-size="10">Docs</text>

  <rect x="322" y="274" width="80" height="28" rx="6" fill="#f778ba" opacity="0.14"/>
  <rect x="322" y="274" width="80" height="28" rx="6" stroke="#f778ba" stroke-width="0.8" fill="none"/>
  <text x="362" y="292" text-anchor="middle" fill="#f778ba" font-family="system-ui, -apple-system, sans-serif" font-size="10">Memory</text>

  <rect x="414" y="274" width="80" height="28" rx="6" fill="#58a6ff" opacity="0.14"/>
  <rect x="414" y="274" width="80" height="28" rx="6" stroke="#58a6ff" stroke-width="0.8" fill="none"/>
  <text x="454" y="292" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">Specs</text>

  <rect x="506" y="274" width="80" height="28" rx="6" fill="#3fb950" opacity="0.14"/>
  <rect x="506" y="274" width="80" height="28" rx="6" stroke="#3fb950" stroke-width="0.8" fill="none"/>
  <text x="546" y="292" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="10">Code</text>

  <rect x="598" y="274" width="68" height="28" rx="6" fill="#d29922" opacity="0.14"/>
  <rect x="598" y="274" width="68" height="28" rx="6" stroke="#d29922" stroke-width="0.8" fill="none"/>
  <text x="632" y="292" text-anchor="middle" fill="#d29922" font-family="system-ui, -apple-system, sans-serif" font-size="10">ADRs</text>

  <!-- Arrows: Knowns → Tools -->
  <line x1="250" y1="324" x2="180" y2="380" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.35"/>
  <polygon points="176,376 178,386 186,380" fill="#3fb950" opacity="0.4"/>

  <line x1="400" y1="324" x2="400" y2="380" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.35"/>
  <polygon points="396,378 400,388 404,378" fill="#3fb950" opacity="0.4"/>

  <line x1="550" y1="324" x2="620" y2="380" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.35"/>
  <polygon points="614,380 622,386 624,376" fill="#3fb950" opacity="0.4"/>

  <!-- ═══ Your Tools Layer (bottom) ═══ -->
  <rect x="80" y="390" width="140" height="52" rx="12" fill="#3fb950" opacity="0.1" filter="url(#shadow)"/>
  <rect x="80" y="390" width="140" height="52" rx="12" stroke="#3fb950" stroke-width="1.2" fill="none"/>
  <text x="150" y="414" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Git / GitHub</text>
  <text x="150" y="430" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Version Control</text>

  <rect x="250" y="390" width="140" height="52" rx="12" fill="#3fb950" opacity="0.1" filter="url(#shadow)"/>
  <rect x="250" y="390" width="140" height="52" rx="12" stroke="#3fb950" stroke-width="1.2" fill="none"/>
  <text x="320" y="414" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">IDE / Editor</text>
  <text x="320" y="430" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">VS Code · Cursor · Vim</text>

  <rect x="420" y="390" width="140" height="52" rx="12" fill="#3fb950" opacity="0.1" filter="url(#shadow)"/>
  <rect x="420" y="390" width="140" height="52" rx="12" stroke="#3fb950" stroke-width="1.2" fill="none"/>
  <text x="490" y="414" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Terminal / CLI</text>
  <text x="490" y="430" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Build · Test · Deploy</text>

  <rect x="590" y="390" width="140" height="52" rx="12" fill="#3fb950" opacity="0.1" filter="url(#shadow)"/>
  <rect x="590" y="390" width="140" height="52" rx="12" stroke="#3fb950" stroke-width="1.2" fill="none"/>
  <text x="660" y="414" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Your Codebase</text>
  <text x="660" y="430" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">Source Code · Config</text>

  <!-- Footer -->
  <text x="400" y="476" text-anchor="middle" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="10">Your stack stays the same. Knowns makes it readable by AI.</text>

  <!-- .knowns/ badge -->
  <rect x="340" y="488" width="120" height="22" rx="11" fill="#a855f7" opacity="0.05"/>
  <rect x="340" y="488" width="120" height="22" rx="11" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="4,2" fill="none"/>
  <text x="400" y="503" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="10">.knowns/</text>
</svg>
